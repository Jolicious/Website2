<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nothing Here</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.28), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .card {
      position: relative;
      width: min(92%, 760px);
      padding: 64px 36px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.54);
      backdrop-filter: blur(22px);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: floatIn 900ms ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      margin-bottom: 26px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      color: #cbd5e1;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 16px #22c55e;
    }

    h1 {
      font-size: clamp(48px, 9vw, 112px);
      line-height: 0.95;
      letter-spacing: -0.08em;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #ffffff, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 560px;
      margin: 0 auto;
      color: #cbd5e1;
      font-size: clamp(17px, 2.2vw, 22px);
      line-height: 1.7;
    }

    .tiny {
      margin-top: 34px;
      color: #64748b;
      font-size: 14px;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(4px);
      opacity: 0.75;
      animation: drift 8s ease-in-out infinite alternate;
    }

    .orb.one {
      width: 90px;
      height: 90px;
      left: -38px;
      top: -34px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
    }

    .orb.two {
      width: 130px;
      height: 130px;
      right: -54px;
      bottom: -58px;
      background: linear-gradient(135deg, #ec4899, #f97316);
      animation-delay: 1s;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: white;
      opacity: 0.5;
      animation: twinkle 3s infinite ease-in-out;
    }

    .star:nth-child(1) { top: 14%; left: 12%; animation-delay: 0s; }
    .star:nth-child(2) { top: 24%; left: 78%; animation-delay: 0.5s; }
    .star:nth-child(3) { top: 72%; left: 18%; animation-delay: 1s; }
    .star:nth-child(4) { top: 64%; left: 83%; animation-delay: 1.4s; }
    .star:nth-child(5) { top: 38%; left: 48%; animation-delay: 2s; }
    .star:nth-child(6) { top: 84%; left: 57%; animation-delay: 2.4s; }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(18px, -14px) scale(1.08);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @media (max-width: 520px) {
      .card {
        padding: 48px 24px;
        border-radius: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <div class="stars">
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
  </div>

  <main class="card">
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="badge">
      <span class="dot"></span>
      Empty space detected
    </div>

    <h1>Nothing<br>Here</h1>

    <p>
      You found the page, but the page found nothing.
      No dashboard. No secrets. No hidden treasure.
      Just a beautifully polished void.
    </p>

    <div class="tiny">
      Please enjoy the silence.
    </div>
  </main>
</body>
</html>
